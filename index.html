<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integrado de Segurança e Motores</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            color: #1a365d;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: #2b6cb0;
            margin-bottom: 15px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        button.secondary {
            background-color: #718096;
        }

        button.secondary:hover {
            background-color: #4a5568;
        }

        button.danger {
            background-color: #e53e3e;
        }

        button.danger:hover {
            background-color: #c53030;
        }

        .panel {
            display: none;
            margin-top: 10px;
        }

        .panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 1rem;
        }

        .output-msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            line-height: 1.4;
            display: none;
        }

        .success { background-color: #c6f6d5; color: #22543d; display: block; }
        .error { background-color: #fed7d7; color: #742a2a; display: block; }
        .info { background-color: #ebf8ff; color: #2b6cb0; display: block; }

        /* Estilos do Mercado */
        .motor-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .motor-info {
            font-size: 0.9rem;
        }

        .motor-info strong {
            display: block;
            color: #2d3748;
            font-size: 0.95rem;
        }

        .btn-buy {
            width: auto;
            padding: 6px 12px;
            font-size: 0.85rem;
            background-color: #38a169;
        }

        .btn-buy:hover {
            background-color: #2f855a;
        }

        .log-list {
            list-style: decimal inside;
            margin-top: 10px;
        }

        .log-list li {
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SISTEMA INTEGRADO DE SEGURANÇA</h1>

    <div id="menu-principal" class="panel active">
        <p style="text-align: center; margin-bottom: 20px; color: #718096;">O que você deseja fazer?</p>
        <div class="menu-buttons">
            <button onclick="changePanel('painel-login')">[1] Fazer Login</button>
            <button onclick="changePanel('painel-cadastro')">[2] Criar Nova Conta</button>
            <button onclick="changePanel('painel-admin')">[3] Painel Admin (Histórico)</button>
        </div>
    </div>

    <div id="painel-login" class="panel">
        <h2>--- Painel de Login ---</h2>
        <div class="form-group">
            <label>Usuário:</label>
            <input type="text" id="login-usuario">
        </div>
        <div class="form-group">
            <label>Senha:</label>
            <input type="password" id="login-senha">
        </div>
        <button onclick="executarLogin()">Entrar</button>
        <button class="secondary" style="margin-top: 10px;" onclick="voltarAoMenu()">Voltar</button>
        <div id="msg-login" class="output-msg"></div>
    </div>

    <div id="painel-cadastro" class="panel">
        <h2>--- Cadastro de Novo Usuário ---</h2>
        <div class="form-group">
            <label>Digite um nome de usuário:</label>
            <input type="text" id="cadastro-usuario">
        </div>
        <button onclick="executarCadastro()">Criar Conta com Senha Forte</button>
        <button class="secondary" style="margin-top: 10px;" onclick="voltarAoMenu()">Voltar</button>
        <div id="msg-cadastro" class="output-msg"></div>
    </div>

    <div id="painel-admin" class="panel">
        <h2>--- Acesso Restrito: Painel Admin ---</h2>
        <div class="form-group" id="admin-auth-box">
            <label>Digite a senha do administrador:</label>
            <input type="password" id="admin-senha">
            <button style="margin-top: 10px;" onclick="acessarAdmin()">Verificar Senha</button>
        </div>
        <div id="admin-conteudo" style="display: none;">
            <h3>=== Últimos Logins Bem-sucedidos ===</h3>
            <ol id="lista-logs" class="log-list"></ol>
        </div>
        <button class="secondary" style="margin-top: 15px;" onclick="voltarAoMenu()">Voltar</button>
        <div id="msg-admin" class="output-msg"></div>
    </div>

    <div id="painel-mercado" class="panel">
        <h2 id="titulo-mercado">🛒 MINI MERCADO DE MOTORES</h2>
        <p style="margin-bottom: 15px; font-size: 0.9rem; color: #4a5568;">Confira nossos modelos disponíveis:</p>
        
        <div id="lista-motores"></div>

        <button class="danger" style="margin-top: 20px;" onclick="deslogarMercado()">[5] Sair do Mercado (Deslogar)</button>
        <div id="msg-mercado" class="output-msg"></div>
    </div>
</div>

<script>
    // --- VARIÁVEIS DO SISTEMA (SIMULANDO O BANCO DE DADOS PYTHON) ---
    const banco_de_usuarios = {
        "admin": "senha",
        "caio": "caio123"
    };
    const registro_de_falhas = {};
    const LIMITE_DE_ERROS = 2;
    const historico_logins = [];

    // CATÁLOGO DO MINI MERCADO DE MOTORES
    const catalogo_motores = [
        { modelo: "Motor Weg W22 Tradicional", potencia: "1 CV", preco: 850.00 },
        { modelo: "Motor Weg W22 Alta Eficiência", potencia: "3 CV", preco: 1450.00 },
        { modelo: "Motor Industrial Blindado", potencia: "5 CV", preco: 2200.00 },
        { modelo: "Motor de Alta Rotação", potencia: "10 CV", preco: 4100.00 }
    ];

    let usuarioLogado = "";

    // FUNÇÃO GERADORA DE SENHA FORTE
    function gerarSenhaForte(tamanho = 8) {
        const letras = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const numeros = "0123456789";
        const simbolos = "!@#$%^&*()_+-=[]{}|;:,.<>?";
        const caracteres = letras + numeros + simbolos;
        
        let senha_sorteada = "";
        for (let i = 0; i < tamanho; i++) {
            const indice = Math.floor(Math.random() * caracteres.length);
            senha_sorteada += caracteres.charAt(indice);
        }
        return senha_sorteada;
    }

    // NAVEGAÇÃO ENTRE PAINÉIS
    function changePanel(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        limparMensagens();
    }

    function voltarAoMenu() {
        document.getElementById('admin-senha').value = "";
        document.getElementById('admin-conteudo').style.display = "none";
        document.getElementById('admin-auth-box').style.display = "block";
        changePanel('menu-principal');
    }

    function limparMensagens() {
        document.querySelectorAll('.output-msg').forEach(msg => {
            msg.textContent = "";
            msg.className = "output-msg";
        });
    }

    // OPÇÃO 1: EXECUÇÃO DO LOGIN
    function executarLogin() {
        const usuarioInput = document.getElementById('login-usuario').value.trim().toLowerCase();
        const senhaInput = document.getElementById('login-senha').value;
        const msg = document.getElementById('msg-login');

        if (!usuarioInput || !senhaInput) {
            msg.textContent = "Preencha todos os campos!";
            msg.className = "output-msg error";
            return;
        }

        let erros_atuais = registro_de_falhas[usuarioInput] || 0;

        if (erros_atuais >= LIMITE_DE_ERROS) {
            msg.innerHTML = `⚠️ ALERTA: A conta '${usuarioInput}' está BLOQUEADA por excesso de tentativas!`;
            msg.className = "output-msg error";
            return;
        }

        if (banco_de_usuarios.hasOwnProperty(usuarioInput) && banco_de_usuarios[usuarioInput] === senhaInput) {
            registro_de_falhas[usuarioInput] = 0;
            historico_logins.push(usuarioInput);
            usuarioLogado = usuarioInput;

            // Limpa campos
            document.getElementById('login-usuario').value = "";
            document.getElementById('login-senha').value = "";

            // Redireciona para o mercado
            carregarMercado();
        } else {
            erros_atuais++;
            registro_de_falhas[usuarioInput] = erros_atuais;
            let tentativas_restantes = LIMITE_DE_ERROS - erros_atuais;

            if (tentativas_restantes > 0) {
                msg.textContent = `Acesso Negado: Usuário ou senha incorretos. Você tem apenas mais ${tentativas_restantes} tentativa(s).`;
                msg.className = "output-msg error";
            } else {
                msg.textContent = `CONTA BLOQUEADA: Limite atingido para '${usuarioInput}'.`;
                msg.className = "output-msg error";
            }
        }
    }

    // OPÇÃO 2: EXECUÇÃO DO CADASTRO
    function executarCadastro() {
        const novoUsuario = document.getElementById('cadastro-usuario').value.trim().toLowerCase();
        const msg = document.getElementById('msg-cadastro');

        if (!novoUsuario) {
            msg.textContent = "Digite um nome de usuário válido!";
            msg.className = "output-msg error";
            return;
        }

        if (banco_de_usuarios.hasOwnProperty(novoUsuario)) {
            msg.textContent = "Erro: Esse usuário já existe! Tente outro nome.";
            msg.className = "output-msg error";
        } else {
            const novaSenha = gerarSenhaForte(8);
            banco_de_usuarios[novoUsuario] = novaSenha;

            msg.innerHTML = `<strong>Conta criada com sucesso!</strong><br>
                             Sua senha gerada é: <span style="font-family:monospace; font-weight:bold; background:#fff; padding:2px 5px;">${novaSenha}</span><br>
                             Guarde-a em um local seguro!`;
            msg.className = "output-msg success";
            document.getElementById('cadastro-usuario').value = "";
        }
    }

    // OPÇÃO 3: ACESSO AO PAINEL ADMIN
    function acessarAdmin() {
        const senhaAdmin = document.getElementById('admin-senha').value;
        const msg = document.getElementById('msg-admin');
        const lista = document.getElementById('lista-logs');

        if (banco_de_usuarios["admin"] === senhaAdmin) {
            document.getElementById('admin-auth-box').style.display = "none";
            document.getElementById('admin-conteudo').style.display = "block";
            msg.className = "output-msg"; // oculta se houver erro antigo
            
            lista.innerHTML = "";
            if (historico_logins.length === 0) {
                lista.innerHTML = "<li>Nenhum login registrado nesta sessão.</li>";
            } else {
                historico_logins.forEach(nome => {
                    let li = document.createElement('li');
                    li.textContent = nome;
                    lista.appendChild(li);
                });
            }
        } else {
            msg.textContent = "Acesso Negado: Senha de administrador incorreta!";
            msg.className = "output-msg error";
        }
    }

    // --- SISTEMA DO MINI MERCADO ---
    function carregarMercado() {
        changePanel('painel-mercado');
        document.getElementById('titulo-mercado').textContent = `🛒 MINI MERCADO (Logado como: ${usuarioLogado})`;
        
        const containerMotores = document.getElementById('lista-motores');
        containerMotores.innerHTML = "";

        catalogo_motores.forEach((motor, index) => {
            const div = document.createElement('div');
            div.className = 'motor-item';
            div.innerHTML = `
                <div class="motor-info">
                    <strong>${motor.modelo}</strong>
                    Potência: ${motor.potencia} - R$ ${motor.preco.toFixed(2)}
                </div>
                <button class="btn-buy" onclick="comprarMotor(${index})">Comprar</button>
            `;
            containerMotores.appendChild(div);
        });
    }

    function comprarMotor(index) {
        const motor = catalogo_motores[index];
        const msg = document.getElementById('msg-mercado');

        msg.innerHTML = `<strong> COMPRA REALIZADA COM SUCESSO!</strong><br>
                         📦 Produto: ${motor.modelo} de ${motor.potencia}<br>
                         💰 Valor: R$ ${motor.preco.toFixed(2)} faturado para a conta de ${usuarioLogado}.`;
        msg.className = "output-msg success";
    }

    function deslogarMercado() {
        alert(`Saindo do mercado... Até logo, ${usuarioLogado}!`);
        usuarioLogado = "";
        voltarAoMenu();
    }
</script>

</body>
</html>
